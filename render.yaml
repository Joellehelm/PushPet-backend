services:
  - type: web
    name: pushpet-backend
    runtime: ruby
    plan: free
    buildCommand: bash ./bin/render-build.sh
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
